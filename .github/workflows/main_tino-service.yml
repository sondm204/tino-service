name: Tino Service CI/CD

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: tino-service-${{ github.ref }}
  cancel-in-progress: true

env:
  AZURE_WEBAPP_NAME: Tino-service
  NODE_VERSION: "22.x"
  PNPM_VERSION: "11.9.0"

jobs:
  build:
    name: Build and verify
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm run --if-present test

      - name: Remove development dependencies
        if: github.event_name != 'pull_request'
        run: pnpm prune --prod

      - name: Create deployment package
        if: github.event_name != 'pull_request'
        run: |
          mkdir -p release
          cp -R dist node_modules package.json pnpm-lock.yaml web.config release/
          tar -czf tino-service-release.tar.gz -C release .

      - name: Upload deployment artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: tino-service-release
          path: tino-service-release.tar.gz
          if-no-files-found: error
          retention-days: 1

  deploy:
    name: Deploy to Azure
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Download deployment artifact
        uses: actions/download-artifact@v4
        with:
          name: tino-service-release

      - name: Extract deployment package
        run: |
          mkdir -p release
          tar -xzf tino-service-release.tar.gz -C release

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_EA793745338C4F2AA54E6AD2B46D1A8E }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_F45D139A62B84D86BE4AF419B7C9B23A }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_C50954B7427D45B488012406493FBF35 }}

      - name: Resolve Azure Web App
        id: azure-app
        shell: bash
        run: |
          RESOURCE_GROUP="$(az webapp list \
            --query "[?name=='${AZURE_WEBAPP_NAME}'].resourceGroup | [0]" \
            --output tsv)"

          if [ -z "$RESOURCE_GROUP" ]; then
            echo "Could not find Azure Web App '${AZURE_WEBAPP_NAME}'."
            exit 1
          fi

          HOSTNAME="$(az webapp show \
            --name "$AZURE_WEBAPP_NAME" \
            --resource-group "$RESOURCE_GROUP" \
            --query defaultHostName \
            --output tsv)"

          IS_LINUX="$(az webapp show \
            --name "$AZURE_WEBAPP_NAME" \
            --resource-group "$RESOURCE_GROUP" \
            --query reserved \
            --output tsv)"

          echo "resource-group=$RESOURCE_GROUP" >> "$GITHUB_OUTPUT"
          echo "hostname=$HOSTNAME" >> "$GITHUB_OUTPUT"
          echo "is-linux=$IS_LINUX" >> "$GITHUB_OUTPUT"
          echo "Deploying to https://${HOSTNAME} (Linux: ${IS_LINUX})"

      - name: Deploy to Azure Web App
        id: deploy
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          slot-name: Production
          package: release
          startup-command: node dist/server.js

      - name: Configure and restart Azure Web App
        shell: bash
        env:
          RESOURCE_GROUP: ${{ steps.azure-app.outputs.resource-group }}
          IS_LINUX: ${{ steps.azure-app.outputs.is-linux }}
        run: |
          if [ "$IS_LINUX" = "true" ]; then
            az webapp config set \
              --name "$AZURE_WEBAPP_NAME" \
              --resource-group "$RESOURCE_GROUP" \
              --startup-file "node dist/server.js"
          fi

          az webapp restart \
            --name "$AZURE_WEBAPP_NAME" \
            --resource-group "$RESOURCE_GROUP"

      - name: Verify deployment
        env:
          WEBAPP_URL: https://${{ steps.azure-app.outputs.hostname }}
        run: |
          echo "Checking ${WEBAPP_URL%/}/health"

          for attempt in {1..12}; do
            STATUS_CODE="$(curl \
              --silent \
              --show-error \
              --output health-response.txt \
              --write-out "%{http_code}" \
              "${WEBAPP_URL%/}/health" || true)"

            echo "Attempt ${attempt}/12 returned HTTP ${STATUS_CODE}"
            cat health-response.txt || true
            echo

            if [ "$STATUS_CODE" = "200" ]; then
              exit 0
            fi

            echo "Health check failed; retrying in 10 seconds."
            sleep 10
          done

          exit 1
